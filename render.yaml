services:
  - type: web
    name: storiesapp
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://storiesapp.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: storiesapp-db
          property: connectionURI

databases:
  - name: storiesapp-db
    plan: free
